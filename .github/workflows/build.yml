name: Build components

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Hafnium and Trusted Firmware-A Build
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/microsoft/mu_devops/ubuntu-24-dev:latest

    steps:
      - name: Generate Token
        if: github.event_name == 'release'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PATINA_AUTOMATION_APPLICATION_ID }}
          private-key: ${{ secrets.PATINA_AUTOMATION_APPLICATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
    
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Pip Modules
        run: |
          python -m pip install --upgrade pip
          pip install -r bios/pip-requirements.txt

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Stuart Setup
        run: python bios/Platforms/QemuSbsaPkg/PlatformBuild.py --setup

      - name: Stuart Update
        run: python bios/Platforms/QemuSbsaPkg/PlatformBuild.py --update

      - name: Stuart Build
        run: python bios/Platforms/QemuSbsaPkg/PlatformBuild.py HAF_TFA_BUILD=TRUE
