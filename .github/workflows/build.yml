name: Build components

on:
  pull_request:
    branches: [main]

jobs:
  devcontainer:
    name: Build Multiplatform Devcontainer
    runs-on: ubuntu-24.04
    steps:
      - name: Cache git folder
        uses: actions/cache@v3
        with:
          path: .git
          key: git-folder-multiplatform-build

      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Checkout patina-qemu submodule
        run: |
          git submodule update --init bios/patina-qemu

      - name: Set up QEMU for multi-architecture builds
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker buildx for multi-architecture builds
        uses: docker/setup-buildx-action@v3
        with:
          use: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: opendevicepartnership
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: image-tags
        run: |
          SHA_TAG="git-$(git rev-parse --short HEAD)"
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tags=latest,${SHA_TAG}" >> $GITHUB_OUTPUT
          else
            echo "tags=cache,${SHA_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Build devcontainer image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer
          cacheFrom: |
            type=registry,ref=ghcr.io/dymk/odp-platform-qemu-sbsa-devcontainer:cache
            type=registry,ref=ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer:cache
            ghcr.io/dymk/odp-platform-qemu-sbsa-devcontainer:latest
            ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer:latest
            ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer:${{ steps.image-tags.outputs.sha_tag }}
          imageTag: ${{ steps.image-tags.outputs.tags }}
          platform: linux/amd64,linux/arm64
          push: never

  build-bios:
    name: Build QEMU Bios
    runs-on: ubuntu-24.04
    steps:
      - name: Cache git folder
        uses: actions/cache@v3
        with:
          path: .git
          key: git-folder-build-bios

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build devcontainer image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer
          cacheFrom: |
            type=registry,ref=ghcr.io/dymk/odp-platform-qemu-sbsa-devcontainer:cache
            type=registry,ref=ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer:cache
            ghcr.io/dymk/odp-platform-qemu-sbsa-devcontainer:latest
            ghcr.io/opendevicepartnership/odp-platform-qemu-sbsa-devcontainer:latest
          push: never
          env: |
            GIT_COMMITTER_NAME=vscode
            GIT_COMMITTER_EMAIL=vscode@example.com
          runCmd: |
            make all